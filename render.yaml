# Render Blueprint — https://render.com/docs/blueprint-spec
# New → Blueprint → connect repo, or add this file and sync.

services:
  - type: web
    name: cipherchat
    env: node
    plan: free
    buildCommand: npm run render:build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
